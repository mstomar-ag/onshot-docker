name: Build & Push Lipsync Pod Image

# Auto-builds and pushes the OnShot lipsync pod docker image to GHCR.
# See lipsync/README.md for full background.

on:
  push:
    branches: [main]
    paths:
      - 'lipsync/**'
      - '.github/workflows/build-lipsync.yml'
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Override the version tag (default: read from lipsync/VERSION)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: agrim-intelligence/lipsync-latentsync

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image version
        id: version
        # NOTE: tag_override is sourced from inputs via env (never inlined into run:)
        # to satisfy the standard GitHub Actions injection-safety guidance.
        env:
          TAG_OVERRIDE: ${{ inputs.tag_override }}
        run: |
          if [ -n "$TAG_OVERRIDE" ]; then
            VER="$TAG_OVERRIDE"
          else
            VER="$(tr -d '[:space:]' < lipsync/VERSION)"
          fi
          if [ -z "$VER" ]; then
            echo "::error::Could not resolve version tag"
            exit 1
          fi
          # Defensive: only allow a conservative tag charset (semver-ish).
          if ! printf '%s' "$VER" | grep -qE '^[A-Za-z0-9._-]+$'; then
            echo "::error::Refusing tag with unsafe characters: $VER"
            exit 1
          fi
          echo "tag=$VER" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $VER"

      - name: Free disk space (image is ~10 GB; default runner has ~14 GB free)
        run: |
          # Drop bundled Android/dotnet/Haskell trees we don't need so the
          # build doesn't OOM-fail on disk pressure mid-checkpoint-download.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: lipsync
          file: lipsync/Dockerfile
          platforms: linux/amd64
          push: true
          # NOTE (fix/lipsync-opt-relocate-shadow branch): only the unique version tag —
          # the `:latest` tag is intentionally NOT pushed here so this experimental branch
          # build can never clobber the image other pipelines pull. Do not re-add :latest
          # on this branch.
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
          # Layer cache between runs — the 7 GB checkpoint downloads are the
          # most expensive layer; cache them aggressively.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image summary
        env:
          IMAGE_TAG: ${{ steps.version.outputs.tag }}
          REGISTRY_URL: ${{ env.REGISTRY }}
          IMAGE_REF: ${{ env.IMAGE_NAME }}
        run: |
          {
            echo "## Lipsync image published"
            echo ""
            echo "- Tag: \`${REGISTRY_URL}/${IMAGE_REF}:${IMAGE_TAG}\`"
            echo "- (branch build — \`:latest\` intentionally NOT updated)"
            echo "- Pull with: \`docker pull ${REGISTRY_URL}/${IMAGE_REF}:${IMAGE_TAG}\`"
          } >> "$GITHUB_STEP_SUMMARY"
